version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: test-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: testdb
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: test-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin1234
    ports:
      - "55050:80"

  app:
    build: ./test-backend
    container_name: test-backend
    restart: always
    ports:
      - "7070:7070"
    depends_on:
      - postgres

volumes:
  postgres_data: